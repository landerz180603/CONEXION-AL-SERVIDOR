
version: "3.9"

services:
  conexion-servidor:
    image: ghcr.io/landerz180603/conexion-al-servidor:1.0.0

    networks:
      - traefik-public


    deploy:
      replicas: 1

      update_config:
        parallelism: 1
        delay: 10s

      restart_policy:
        condition: on-failure

      labels:
        - "traefik.enable=true"

        - "traefik.http.routers.paulgallo.entrypoints=http"
        - "traefik.http.routers.paulgallo.rule=Host(`paulgallo.byronrm.com`)"

        - "traefik.http.middlewares.paulgallo-https-redirect.redirectscheme.scheme=https"
        - "traefik.http.routers.paulgallo.middlewares=paulgallo-https-redirect"

        - "traefik.http.routers.paulgallo-secure.entrypoints=https"
        - "traefik.http.routers.paulgallo-secure.rule=Host(`paulgallo.byronrm.com`)"
        - "traefik.http.routers.paulgallo-secure.tls=true"
        - "traefik.http.routers.paulgallo-secure.tls.certresolver=http"

        - "traefik.http.services.paulgallo-secure.loadbalancer.server.port=5000"

        - "traefik.docker.network=traefik-public"

networks:
  traefik-public:
    external: true

